<h1>Vampire Maze</h1>
<canvas id="game" width="640" height="640"></canvas>

<script>
    //Global variables
    let canvas;
    let ctx;
    let game;

    //character class
    class Character {
        constructor(x,y,hp,atk,def,img) {//constructor takes coordinates HP and other elements
            this.x=x;
            this.y=y;
            this.HP=hp;
            this.MHP=hp;
            this.ATK=atk;
            this.DEF=def;
            this.PIC=img;
        }
        attack(target) {//DAMAGE IS BASE ON THE BASE ATTACK WHICH IS ATK - DEF OF TARGET NEVER LESS THAN 1 AND THEN MULTIPLI RAMDO
            let base = Math.max(this.ATK - target.DEF, 1);
            let dmg = base * (Math.floor(Math.random()*6) + 1);
            target.HP -= dmg;//substrack attack
            if (target.HP < 0) target.HP = 0;//CHECKING FOR ENDING BAR not below zero
        }


        render(size) {//img size to be propeortion to the squares or tiles
            ctx.drawImage(
                this.PIC,
                this.x * size,
                this.y * size,
                size,
                size
            );
            //max hp red
            ctx.fillStyle = "red";
            ctx.fillRect(this.x*size, this.y*size-8, size, 6);
            // green hp
            ctx.fillStyle = "lime";
            ctx.fillRect(this.x*size, this.y*size-8, size*(this.HP/this.MHP), 6);
        }
    }

    class Player extends Character {}//player inherits from chracter

    class Monster extends Character {//monster also inherits from character
        move(game) {
            let dirs=[[1,0],[-1,0],[0,1],[0,-1]];//directions L R U D
            let [dx,dy]=dirs[Math.floor(Math.random()*4)];//ramdon move to one of the above
            let nx=this.x+dx; // add dir to current coor x
            let ny=this.y+dy;// add dir to current coor y
            //attack if monster reaches player
            if(nx===game.player.x && ny===game.player.y){
                this.attack(game.player);
                return;// prevents from  moving to the square
            }

            game.tryMove(this,dx,dy);
        }
    }

            this.player = new Player(1,1,40,8,4,this.heroImg);

            this.monsters = [
                new Monster(5,5,12,4,1,this.monImgs[0]),
                new Monster(7,3,16,5,2,this.monImgs[1]),
                new Monster(3,7,20,6,3,this.monImgs[2])
            ];
        }


        //mpa from arrsay with fill rec command 2d
        drawMap() {
            for(let y=0;y<10;y++){
                for(let x=0;x<10;x++){
                    if(this.map[y][x]===1){
                        ctx.fillStyle="gray";
                        ctx.fillRect(x*this.TILE,y*this.TILE,this.TILE,this.TILE);
                    }
                    if(this.map[y][x]===2){
                        ctx.fillStyle="green";
                        ctx.fillRect(x*this.TILE,y*this.TILE,this.TILE,this.TILE);
                    }
                    if(this.map[y][x]===3){//postions
                        ctx.fillStyle="red";
                        ctx.fillRect(x*this.TILE+20,y*this.TILE+20,24,24);
                    }
                }
            }
        }


        //movement and collision
        tryMove(e, dx, dy) {
            let nx = e.x + dx;
            let ny = e.y + dy;

            if (e === this.player) {//checks if the player moved into any monsters
                for (let m of this.monsters) {
                    if (m.x === nx && m.y === ny) {
                        this.player.attack(m);
                        return; // prevents f rom moving into the same tile
                    }
                }
            }

            if (this.map[ny][nx] === 1 || this.map[ny][nx] === 2) return; // if wall or tree not move either


            //updating coordinates for moving entities
            e.x = nx;
            e.y = ny;
        }


        movePlayer(dx,dy) {
            this.tryMove(this.player,dx,dy);
            if(this.map[this.player.y][this.player.x]===3){// if postion in coord heal player and detoy postion
                this.player.HP=this.player.MHP;
                this.map[this.player.y][this.player.x]=0;
            }

            this.monsters.forEach(m=>m.move(this));// call move for each monter when player moves
            this.monsters = this.monsters.filter(m => m.HP > 0);// remove monsters whose fdo  not meet hp condition

            this.update();
            if (this.player.HP <= 0) {
                alert("GAME OVER");
                return;
            }

            if (this.monsters.length === 0) {
                alert("YOU WIN");
                return;
            }
        }

        update() {
            ctx.clearRect(0,0,canvas.width,canvas.height); // redrwing game
            this.drawMap();
            this.player.render(this.TILE);
            this.monsters.forEach(m=>m.render(this.TILE));
            ctx.fillStyle="white";
            if(this.player.HP<=0)ctx.fillText("GAME OVER",260,320);
            if(this.monsters.length===0)ctx.fillText("YOU WIN",270,320);
        }
    }

    window.onload=()=>{// onload prepare globals and update to render canvas
        canvas = document.getElementById("game");
        ctx = canvas.getContext("2d");
        game = new Game();
        game.update();
    };
    //key input
    document.addEventListener("keydown", e => {
        if (!game) return;

        switch (e.key) {
            case "ArrowUp":
            case "w":
            case "W":
                game.movePlayer(0, -1);
                break;

            case "ArrowDown":
            case "s":
            case "S":
                game.movePlayer(0, 1);
                break;

            case "ArrowLeft":
            case "a":
            case "A":
                game.movePlayer(-1, 0);
                break;

            case "ArrowRight":
            case "d":
            case "D":
                game.movePlayer(1, 0);
                break;
        }
    });

</script>
<p>Commands</p>
<button onclick="game.movePlayer(0,-1)">Up</button>
<button onclick="game.movePlayer(0,1)">Down</button>
<button onclick="game.movePlayer(-1,0)">Left</button>
<button onclick="game.movePlayer(1,0)">Right</button>
