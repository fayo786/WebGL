<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebGL MFG</title>
    <style>
        body { margin: 0; }
        canvas { display: block; background: #f5f5f5; }
    </style>
</head>
<body>

<canvas id="glcanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById("glcanvas");
    const gl = canvas.getContext("webgl");

    if (!gl) {
        alert("WebGL not supported");
    }
    // Webgl workflow :
    //shaders with gl.createShader(),
    // compiling them,
    // linking into a program,
    // cleaning buffers with gl.clear(),
    // binding data, and
    // issuing draw calls like gl.drawArrays()

    const vertexShaderSource = `
attribute vec2 aPosition;
attribute vec3 aColor;
varying vec3 vColor;

void main() {
    gl_Position = vec4(aPosition, 0.0, 1.0);
    vColor = aColor;
}
`;

    const fragmentShaderSource = `
precision mediump float;
varying vec3 vColor;

void main() {
    gl_FragColor = vec4(vColor, 1.0);
}
`;

    function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
    }

    const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
    const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    gl.useProgram(program);

    //******************************************
    //  LETTERS: M (Red), F (Green), G (Blue)
    //  Format: X, Y, R, G, B


    const vertices = new Float32Array([

        //M (RED)
        -0.9, -0.5, 1,0,0,
        -0.9,  0.5, 1,0,0,

        -0.9,  0.5, 1,0,0,
        -0.75, -0.1, 1,0,0,

        -0.75, -0.1, 1,0,0,
        -0.6,  0.5, 1,0,0,

        -0.6,  0.5, 1,0,0,
        -0.6, -0.5, 1,0,0,


        //  F (GREEN)
        -0.2, -0.5, 0,1,0,
        -0.2,  0.5, 0,1,0,

        -0.2,  0.5, 0,1,0,
        0.1,  0.5, 0,1,0,

        -0.2,  0.0, 0,1,0,
        0.05, 0.0, 0,1,0,


        // G (BLUE)
        0.5,  0.5, 0,0,1,
        0.8,  0.5, 0,0,1,

        0.5,  0.5, 0,0,1,
        0.5, -0.5, 0,0,1,

        0.5, -0.5, 0,0,1,
        0.8, -0.5, 0,0,1,

        0.8, -0.5, 0,0,1,
        0.8, -0.1, 0,0,1,

        0.8, -0.1, 0,0,1,
        0.65, -0.1, 0,0,1,
    ]);

    //*******************************

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

    const aPosition = gl.getAttribLocation(program, "aPosition");
    gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, 5 * 4, 0);
    gl.enableVertexAttribArray(aPosition);

    const aColor = gl.getAttribLocation(program, "aColor");
    gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 5 * 4, 2 * 4);
    gl.enableVertexAttribArray(aColor);

    gl.clearColor(1.0, 1.0, 1.0, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);

    // Draw using lines
    gl.drawArrays(gl.LINES, 0, vertices.length / 5);

</script>

</body>
</html>
