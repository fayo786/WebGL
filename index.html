<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body onload = "InitDemo()">
<canvas id="game-surface" width="600" height="600">
    Your browser does not support the HTML5 canvas tag.
</canvas>
    <br />
    <i>Demo is above this text</i>
<script>
    //vertex shader
    var vertexShaderText = `
    precision mediump float;

    attribute vec3 vertPosition;
    attribute vec3 vertColor;
    uniform mat4 uMatrix;
    uniform mat4 uProjection;

    varying vec3 fragColor;
    void main(void) {
        fragColor = vertColor;
        gl_Position = uProjection * uMatrix * vec4(vertPosition,1.0);
    }
    `;

    //fragment shader
    var fragmentShaderText = `
    precision mediump float;
    varying vec3 fragColor;
    void main(void) {
        gl_FragColor = vec4(fragColor,1.0);
    }
    `;




    function getXRotationMatrix(angleInRadians) {
        var c = Math.cos(angleInRadians);
        var s = Math.sin(angleInRadians);

        // WebGL matrices are column-major
        return new Float32Array([
            1, 0,  0, 0,
            0, c, -s, 0,
            0, s,  c, 0,
            0, 0,  0, 1
        ]);
    }

    function getPerspectiveMatrix(fov, aspect, near, far) {

        const f = 1.0 / Math.tan(fov / 2);
        const rangeInv = 1 / (near - far);

        return new Float32Array([
            f / aspect, 0, 0, 0,
            0, f, 0, 0,
            0, 0, (near + far) * rangeInv, -1,
            0, 0, near * far * rangeInv * 2, 0
        ]);
    }
    //main canvas function
    var InitDemo = function () {
        console.log('This is working');

        var canvas = document.getElementById('game-surface');
        var gl = canvas.getContext('webgl');

        const projectionMatrix = getPerspectiveMatrix(
            Math.PI/4,
            canvas.width/canvas.height,
            0.1,
            100
        );



        if (!gl) {
            console.log('WebGL not supported, falling back on experimental-webgl');
            gl = canvas.getContext('experimental-webgl');
        }

        if (!gl) {
            alert('Your browser does not support WebGL');
        }
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.75, 0.85, 0.8, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        //
        // Create shaders
        //
        var vertexShader = gl.createShader(gl.VERTEX_SHADER);
        var fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);

        gl.shaderSource(vertexShader, vertexShaderText);
        gl.shaderSource(fragmentShader, fragmentShaderText);

        gl.compileShader(vertexShader);
        if (!gl.getShaderParameter(vertexShader, gl.COMPILE_STATUS)) {
            console.error('ERROR compiling vertex shader!', gl.getShaderInfoLog(vertexShader));
            return;
        }

        gl.compileShader(fragmentShader);
        if (!gl.getShaderParameter(fragmentShader, gl.COMPILE_STATUS)) {
            console.error('ERROR compiling fragment shader!', gl.getShaderInfoLog(fragmentShader));
            return;
        }

        var program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('ERROR linking program!', gl.getProgramInfoLog(program));
            return;
        }
        gl.validateProgram(program);
        if (!gl.getProgramParameter(program, gl.VALIDATE_STATUS)) {
            console.error('ERROR validating program!', gl.getProgramInfoLog(program));
            return;
        }

        //
        // Create buffer
        //
        var triangleVertices =
            [ // X, Y,       R, G, B
                0.0, 0.5, -3.5,    1.0, 1.0, 0.0,
                -0.5, -0.5, -3.0,  0.7, 0.0, 1.0,
                0.5, -0.5, -3.5,  0.1, 1.0, 0.6
            ];

        var triangleVertexBufferObject = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, triangleVertexBufferObject);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(triangleVertices), gl.STATIC_DRAW);

        var positionAttribLocation = gl.getAttribLocation(program, 'vertPosition');
        var colorAttribLocation = gl.getAttribLocation(program, 'vertColor');
        gl.vertexAttribPointer(
            positionAttribLocation, // Attribute location
            3, // Number of elements per attribute
            gl.FLOAT, // Type of elements
            gl.FALSE,
            6 * Float32Array.BYTES_PER_ELEMENT, // Size of an individual vertex
            0 // Offset from the beginning of a single vertex to this attribute
        );
        gl.vertexAttribPointer(
            colorAttribLocation, // Attribute location
            3, // Number of elements per attribute
            gl.FLOAT, // Type of elements
            gl.FALSE,
            6 * Float32Array.BYTES_PER_ELEMENT, // Size of an individual vertex
            3 * Float32Array.BYTES_PER_ELEMENT // Offset from the beginning of a single vertex to this attribute
        );

        gl.enableVertexAttribArray(positionAttribLocation);
        gl.enableVertexAttribArray(colorAttribLocation);

        //
        // Main render loop
        //
        gl.useProgram(program);

        const projLocation = gl.getUniformLocation(program, "uProjection");
        const matrixLocation = gl.getUniformLocation(program, "uMatrix");


        gl.uniformMatrix4fv(projLocation, false, projectionMatrix);

        gl.enable(gl.DEPTH_TEST);
        gl.useProgram(program);


        let angle = 0;


        function animate() {

            angle += 0.01;



            const matrix = getXRotationMatrix(angle);
            gl.uniformMatrix4fv(matrixLocation, false, matrix);
            gl.useProgram(program);

            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.drawArrays(gl.TRIANGLES, 0, 3);

            requestAnimationFrame(animate);
        }

        animate();

    };




</script>
</body>
</html>
